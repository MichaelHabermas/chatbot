<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAGatha Ch'Bot</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8fafc; --bar: #ffffff; --sidebar: #ffffff;
      --bubble-user: #2563eb; --bubble-ai: #ffffff;
      --border: #e2e8f0; --text: #0f172a; --muted: #64748b;
      --accent: #2563eb; --accent-h: #1d4ed8;
      --chip-bg: #eff6ff; --chip-text: #1e40af;
      --input-bg: #ffffff; --shadow: 0 1px 3px rgba(0,0,0,.08);
      --error-bg: #fef2f2; --error-border: #fecaca; --error-text: #991b1b;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a; --bar: #1e293b; --sidebar: #1e293b;
        --bubble-user: #1d4ed8; --bubble-ai: #1e293b;
        --border: #334155; --text: #f1f5f9; --muted: #94a3b8;
        --chip-bg: #1e3a5f; --chip-text: #93c5fd;
        --input-bg: #1e293b; --shadow: 0 1px 3px rgba(0,0,0,.3);
        --error-bg: #2d1515; --error-border: #7f1d1d; --error-text: #fca5a5;
      }
    }

    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; color: var(--text); background: var(--bg); }
    #app { display: flex; flex-direction: column; height: 100vh; }

    /* ── Top bar ── */
    #topbar { display: flex; align-items: center; gap: 10px; padding: 0 14px; height: 52px; background: var(--bar); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    #brand { font-weight: 700; font-size: 15px; white-space: nowrap; display: flex; align-items: center; gap: 6px; }
    #settings { display: flex; align-items: center; gap: 6px; margin-left: auto; }
    #settings select, #settings input { height: 32px; padding: 0 9px; border: 1px solid var(--border); border-radius: 6px; background: var(--input-bg); color: var(--text); font-size: 13px; outline: none; }
    #settings select:focus, #settings input:focus { border-color: var(--accent); }
    #settings .lbl { font-size: 12px; color: var(--muted); white-space: nowrap; position: relative; cursor: help; }
    #settings .lbl::after { content: attr(data-tip); position: absolute; top: calc(100% + 8px); right: 0; background: #1e293b; color: #f1f5f9; padding: 8px 12px; border-radius: 7px; font-size: 12px; width: 240px; white-space: normal; line-height: 1.5; pointer-events: none; opacity: 0; transition: opacity .15s; z-index: 999; box-shadow: 0 4px 16px rgba(0,0,0,.25); }
    #settings .lbl:hover::after { opacity: 1; }
    #base-url { width: 200px; }
    #api-key { width: 160px; }

    /* ── Banner ── */
    #banner { padding: 7px 14px; font-size: 13px; background: #fffbeb; border-bottom: 1px solid #fde68a; color: #92400e; }
    #banner.hidden { display: none; }

    /* ── Layout ── */
    #main { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ── */
    #sidebar { width: 256px; flex-shrink: 0; display: flex; flex-direction: column; background: var(--sidebar); border-right: 1px solid var(--border); }
    #dropzone { padding: 10px; border-bottom: 1px solid var(--border); }
    #dz { border: 2px dashed var(--border); border-radius: 8px; padding: 18px 10px; text-align: center; cursor: pointer; transition: border-color .15s, background .15s; }
    #dz:hover, #dz.over { border-color: var(--accent); background: var(--chip-bg); }
    #dz .di { font-size: 22px; margin-bottom: 6px; }
    #dz p { font-size: 12px; color: var(--muted); line-height: 1.6; }
    #dz label { color: var(--accent); cursor: pointer; text-decoration: underline; }

    #doc-list { flex: 1; overflow-y: auto; padding: 4px 0; }
    .doc { display: flex; align-items: center; gap: 8px; padding: 7px 10px; }
    .doc:hover { background: var(--bg); }
    .dico { font-size: 15px; flex-shrink: 0; }
    .dinfo { flex: 1; min-width: 0; }
    .dname { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dmeta { font-size: 11px; color: var(--muted); }
    .drm { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 17px; line-height: 1; padding: 0 2px; flex-shrink: 0; }
    .drm:hover { color: #ef4444; }
    #no-docs { padding: 20px 10px; text-align: center; color: var(--muted); font-size: 13px; }

    #corpus-stats { padding: 7px 10px; font-size: 12px; color: var(--muted); border-top: 1px solid var(--border); min-height: 30px; }

    /* ── Chat panel ── */
    #chat-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; }

    /* ── Empty state ── */
    #empty { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; color: var(--muted); text-align: center; gap: 10px; padding: 40px; }
    #empty .ei { font-size: 38px; }
    #empty p { font-size: 14px; line-height: 1.7; }

    /* ── Messages ── */
    .msg { display: flex; flex-direction: column; max-width: 78%; }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.assistant { align-self: flex-start; align-items: flex-start; }
    .bubble { padding: 10px 14px; border-radius: 12px; line-height: 1.65; word-break: break-word; }
    .msg.user .bubble { background: var(--bubble-user); color: #fff; border-radius: 14px 14px 2px 14px; }
    .msg.assistant .bubble { background: var(--bubble-ai); border: 1px solid var(--border); border-radius: 14px 14px 14px 2px; box-shadow: var(--shadow); }
    .msg.err .bubble { background: var(--error-bg); border-color: var(--error-border); color: var(--error-text); }
    .bubble p { margin-bottom: 8px; } .bubble p:last-child { margin-bottom: 0; }
    .bubble ul, .bubble ol { padding-left: 20px; margin: 5px 0; }
    .bubble pre { background: var(--bg); border-radius: 6px; padding: 10px 12px; overflow-x: auto; margin: 8px 0; }
    .bubble code { font-family: 'SF Mono', Consolas, 'Fira Code', monospace; font-size: 13px; }
    .bubble :not(pre) > code { background: var(--bg); padding: 1px 5px; border-radius: 4px; }
    .bubble blockquote { border-left: 3px solid var(--border); padding-left: 10px; color: var(--muted); margin: 6px 0; }
    .bubble h1,.bubble h2,.bubble h3 { margin: 10px 0 4px; font-size: 15px; }
    .msg-actions { display: flex; gap: 4px; margin-top: 4px; }
    .cpbtn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 12px; padding: 2px 8px; border-radius: 4px; }
    .cpbtn:hover { background: var(--bg); color: var(--text); }
    .sources { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .chip { font-size: 11px; background: var(--chip-bg); color: var(--chip-text); padding: 2px 9px; border-radius: 10px; white-space: nowrap; max-width: 180px; overflow: hidden; text-overflow: ellipsis; }

    /* ── Typing indicator ── */
    .tdot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--muted); margin: 0 2px; animation: blink 1.2s infinite; }
    .tdot:nth-child(2) { animation-delay: .2s; } .tdot:nth-child(3) { animation-delay: .4s; }
    @keyframes blink { 0%,80%,100%{opacity:.25} 40%{opacity:1} }

    /* ── Input area ── */
    #input-area { padding: 10px 14px 12px; border-top: 1px solid var(--border); background: var(--bar); flex-shrink: 0; }
    #ret-ind { font-size: 12px; color: var(--accent); margin-bottom: 5px; }
    #ret-ind.hidden { display: none; }
    #chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
    #chips.hidden { display: none; }
    #chips button { background: #1e293b; border: 1px solid #334155; color: #94a3b8; border-radius: 20px; padding: 5px 12px; font-size: 12px; cursor: pointer; transition: background .15s, color .15s; text-align: left; }
    #chips button:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    #chat-input { width: 100%; resize: none; padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--input-bg); color: var(--text); font-size: 14px; font-family: inherit; line-height: 1.5; outline: none; transition: border-color .15s; }
    #chat-input:focus { border-color: var(--accent); }
    #input-row { display: flex; align-items: center; justify-content: space-between; margin-top: 7px; }
    .hint { font-size: 12px; color: var(--muted); }
    #send-btn { padding: 7px 18px; background: var(--accent); color: #fff; border: none; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background .15s; }
    #send-btn:hover:not(:disabled) { background: var(--accent-h); }
    #send-btn:disabled { opacity: .4; cursor: not-allowed; }
  </style>
</head>
<body>
<div id="app">
  <header id="topbar">
    <div id="brand">⚡ RAGatha Ch'Bot</div>
    <div id="settings">
      <span class="lbl" data-tip="Which AI model answers your questions. gpt-4o-mini is the cheapest OpenAI option. Llama and Mixtral are free via Groq — change the API endpoint below to use them.">Model ⓘ</span>
      <select id="model-select">
        <option value="gpt-4o-mini">gpt-4o-mini (cheap)</option>
        <option value="gpt-4o">gpt-4o</option>
        <option value="o3-mini">o3-mini</option>
        <option value="llama3.2">Llama 3.2 (Ollama)</option>
        <option value="llama-3.3-70b-versatile">Llama 3.3 70B (Groq)</option>
        <option value="llama-3.1-8b-instant">Llama 3.1 8B · fast (Groq)</option>
        <option value="mixtral-8x7b-32768">Mixtral 8x7B (Groq)</option>
        <option value="gemma2-9b-it">Gemma 2 9B (Groq)</option>
      </select>
      <span class="lbl" data-tip="The API server to send requests to. Default is OpenAI. To use free Groq models, enter: https://api.groq.com/openai/v1 — for local Ollama: http://localhost:11434/v1">API endpoint ⓘ</span>
      <input type="url" id="base-url" placeholder="https://api.openai.com/v1" list="endpoint-list">
      <datalist id="endpoint-list">
        <option value="https://api.openai.com/v1">OpenAI</option>
        <option value="https://api.groq.com/openai/v1">Groq (free models)</option>
        <option value="http://localhost:11434/v1">Ollama (local)</option>
        <option value="http://localhost:1234/v1">LM Studio (local)</option>
        <option value="https://api.together.xyz/v1">Together AI</option>
        <option value="https://openrouter.ai/api/v1">OpenRouter</option>
        <option value="https://api.mistral.ai/v1">Mistral AI</option>
      </datalist>
      <span class="lbl" data-tip="Your API key for the service above. OpenAI keys start with sk-. Get a free Groq key at console.groq.com. Stored only in this browser — sent directly to the API, nowhere else.">API key ⓘ</span>
      <input type="password" id="api-key" placeholder="sk-…">
    </div>
  </header>
  <div id="banner" class="hidden"></div>
  <div id="main">
    <aside id="sidebar">
      <div id="dropzone">
        <div id="dz">
          <div class="di">📄</div>
          <p>Drop files or <label for="file-input">browse</label></p>
          <p>PDF · DOCX · TXT · MD</p>
          <input type="file" id="file-input" accept=".pdf,.docx,.txt,.md" multiple hidden>
        </div>
      </div>
      <div id="doc-list"><div id="no-docs">No documents yet</div></div>
      <div id="corpus-stats"></div>
    </aside>
    <main id="chat-panel">
      <div id="messages">
        <div id="empty">
          <div class="ei">💬</div>
          <p>Upload documents in the sidebar,<br>then ask questions here.</p>
        </div>
      </div>
      <div id="input-area">
        <div id="ret-ind" class="hidden">🔍 Retrieving relevant context…</div>
        <div id="chips" class="hidden"></div>
        <textarea id="chat-input" rows="3" placeholder="Ask a question about your documents…"></textarea>
        <div id="input-row">
          <span class="hint" id="send-hint">Upload a document to enable chat</span>
          <button id="send-btn" disabled>Send</button>
        </div>
      </div>
    </main>
  </div>
</div>
<script>
// ── Constants ──────────────────────────────────────────────────────────────────
const PDF_WORKER = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
const CHUNK_SIZE = 1200, OVERLAP = 100, TOP_K = 5, HIST_MAX = 50;
const IDB_NAME = 'ragchatbot', IDB_STORE = 'corpus';

// ── State ──────────────────────────────────────────────────────────────────────
let corpus = [];       // [{id, name, chunks[], tfData[{tf}]}]
let idb = null;
let chatHistory = [];  // [{role, content}]
let streaming = false;

// ── DOM ────────────────────────────────────────────────────────────────────────
const $  = id => document.getElementById(id);
const el = {
  msgs: $('messages'), input: $('chat-input'), send: $('send-btn'),
  docs: $('doc-list'), stats: $('corpus-stats'), banner: $('banner'),
  ret: $('ret-ind'), empty: $('empty')
};

// ── LocalStorage ───────────────────────────────────────────────────────────────
const lsGet = k => localStorage.getItem(k);
const lsSet = (k, v) => { try { localStorage.setItem(k, v); } catch {} };
const saveHist = () => lsSet('cb_hist', JSON.stringify(chatHistory.slice(-HIST_MAX)));

// ── Settings ───────────────────────────────────────────────────────────────────
function initSettings() {
  const key = lsGet('cb_key'), url = lsGet('cb_url'), model = lsGet('cb_model');
  if (key) $('api-key').value = key;
  if (url) $('base-url').value = url;
  if (model) $('model-select').value = model;
  $('api-key').addEventListener('input', e => lsSet('cb_key', e.target.value));
  $('base-url').addEventListener('input', e => lsSet('cb_url', e.target.value));
  $('model-select').addEventListener('change', e => lsSet('cb_model', e.target.value));
  if (!lsGet('cb_warned')) {
    showBanner('⚠️ Your API key is stored unencrypted in this browser. Do not use on shared computers.');
    lsSet('cb_warned', '1');
  }
}

// ── Notifications ──────────────────────────────────────────────────────────────
function showBanner(msg) {
  el.banner.textContent = msg;
  el.banner.classList.remove('hidden');
}

function toast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#0f172a;color:#f1f5f9;padding:8px 16px;border-radius:8px;font-size:13px;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.25)';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2800);
}

// ── IndexedDB ──────────────────────────────────────────────────────────────────
async function initIDB() {
  return new Promise(resolve => {
    try {
      const req = indexedDB.open(IDB_NAME, 1);
      req.onupgradeneeded = e => e.target.result.createObjectStore(IDB_STORE, { keyPath: 'id' });
      req.onsuccess = e => { idb = e.target.result; resolve(); };
      req.onerror = () => resolve();
    } catch {
      showBanner('Corpus persistence unavailable in Private Browsing — documents will be lost on refresh.');
      resolve();
    }
  });
}

function idbRun(mode, fn) {
  if (!idb) return Promise.resolve();
  return new Promise(resolve => {
    const tx = idb.transaction(IDB_STORE, mode);
    fn(tx.objectStore(IDB_STORE), resolve);
    tx.onerror = e => {
      if (e.target.error?.name === 'QuotaExceededError') toast('Storage limit reached. Remove old documents to continue.');
      resolve();
    };
  });
}

const idbSave = doc => idbRun('readwrite', (s, done) => { s.put(doc); s.transaction.oncomplete = done; });
const idbDel  = id  => idbRun('readwrite', (s, done) => { s.delete(id); s.transaction.oncomplete = done; });
const idbAll  = ()  => idbRun('readonly',  (s, done) => { const r = s.getAll(); r.onsuccess = e => done(e.target.result || []); });

// ── Chunker ────────────────────────────────────────────────────────────────────
function chunkText(text) {
  const chunks = [];
  let start = 0;
  while (start < text.length) {
    let end = Math.min(start + CHUNK_SIZE, text.length);
    if (end < text.length) {
      const win = text.slice(end - 150, end + 150);
      const m = win.search(/[.!?]\s+/);
      if (m !== -1) end = end - 150 + m + 1;
    }
    const c = text.slice(start, end).trim();
    if (c.length > 30) chunks.push(c);
    if (end >= text.length) break;
    start = end - OVERLAP;
  }
  return chunks;
}

// ── TF-IDF ─────────────────────────────────────────────────────────────────────
const tokenize = text => text.toLowerCase().replace(/[^a-z0-9\s]/g, ' ').split(/\s+/).filter(t => t.length > 1);

function buildTF(tokens) {
  const tf = {}, n = tokens.length || 1;
  for (const t of tokens) tf[t] = (tf[t] || 0) + 1;
  for (const t in tf) tf[t] /= n;
  return tf;
}

async function suggestQuestions(doc) {
  const apiKey = lsGet('cb_key') || '';
  const baseUrl = (lsGet('cb_url') || 'https://api.openai.com/v1').replace(/\/$/, '');
  const model = $('model-select').value;
  if (!apiKey && !baseUrl.includes('localhost')) return;
  try {
    const sample = doc.chunks.slice(0, 3).join('\n').slice(0, 1200);
    const res = await fetch(`${baseUrl}/chat/completions`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
      body: JSON.stringify({
        model, stream: false,
        messages: [{ role: 'user', content: `Given this document excerpt, generate 3 short, specific questions a user might ask. Return a JSON array of strings only, no explanation.\n\n${sample}` }],
        max_tokens: 150
      })
    });
    if (!res.ok) return;
    const j = await res.json();
    const text = j.choices?.[0]?.message?.content?.trim() || '';
    const match = text.match(/\[[\s\S]*\]/);
    if (!match) return;
    const questions = JSON.parse(match[0]).slice(0, 3);
    const chips = $('chips');
    chips.innerHTML = '';
    questions.forEach(q => {
      const btn = document.createElement('button');
      btn.textContent = q;
      btn.addEventListener('click', () => {
        el.input.value = q;
        chips.classList.add('hidden');
        chips.innerHTML = '';
        el.input.focus();
      });
      chips.appendChild(btn);
    });
    chips.classList.remove('hidden');
  } catch {}
}

async function expandWithHistory(query, history, baseUrl, apiKey, model) {
  if (!history.length) return query;
  try {
    const ctx = history.slice(-4).map(m => `${m.role}: ${m.content}`).join('\n');
    const res = await fetch(`${baseUrl}/chat/completions`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
      body: JSON.stringify({
        model, stream: false,
        messages: [{ role: 'user', content: `Rewrite the question as a fully self-contained search query using the conversation context. Return only the rewritten query, nothing else.\n\nConversation:\n${ctx}\n\nQuestion: ${query}` }],
        max_tokens: 80
      })
    });
    if (!res.ok) return query;
    const j = await res.json();
    return j.choices?.[0]?.message?.content?.trim() || query;
  } catch { return query; }
}

async function hydeExpand(query, baseUrl, apiKey, model) {
  try {
    const res = await fetch(`${baseUrl}/chat/completions`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
      body: JSON.stringify({
        model, stream: false,
        messages: [{ role: 'user', content: `Write one paragraph that would answer this question if found in a document: ${query}` }],
        max_tokens: 120
      })
    });
    if (!res.ok) return query;
    const j = await res.json();
    const hyp = j.choices?.[0]?.message?.content || '';
    return hyp ? hyp + ' ' + query : query;
  } catch { return query; }
}

function retrieve(query) {
  const terms = [...new Set(tokenize(query))];
  if (!terms.length || !corpus.length) return [];
  const all = corpus.flatMap(doc => doc.tfData.map((d, i) => ({ doc, i, tf: d.tf })));
  const N = all.length;
  const idf = Object.fromEntries(terms.map(t => {
    const df = all.filter(c => t in c.tf).length;
    return [t, Math.log((N + 1) / (df + 1)) + 1];
  }));
  return all
    .map(c => ({ ...c, score: terms.reduce((s, t) => s + (c.tf[t] || 0) * idf[t], 0) }))
    .filter(c => c.score > 0)
    .sort((a, b) => b.score - a.score)
    .slice(0, TOP_K);
}

// ── Parsers ────────────────────────────────────────────────────────────────────
async function parsePDF(file) {
  try {
    pdfjsLib.GlobalWorkerOptions.workerSrc = PDF_WORKER;
    const pdf = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
    let text = '';
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      text += content.items.map(s => s.str).join(' ') + '\n';
    }
    if (text.trim().length < 100) throw new Error('scanned');
    return text;
  } catch (e) {
    if (e.message === 'scanned')
      throw new Error('No text extracted — this may be a scanned PDF. Only text-based PDFs are supported.');
    throw new Error('PDF parsing failed. If opening locally (file://), try serving via localhost or GitHub Pages.');
  }
}

async function parseDOCX(file) {
  const result = await mammoth.extractRawText({ arrayBuffer: await file.arrayBuffer() });
  return result.value;
}

function parseText(file) {
  return new Promise((ok, fail) => {
    const r = new FileReader();
    r.onload = e => ok(e.target.result);
    r.onerror = () => fail(new Error('Could not read file.'));
    r.readAsText(file);
  });
}

// ── File processing ────────────────────────────────────────────────────────────
async function processFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (!['pdf', 'docx', 'txt', 'md'].includes(ext)) return;
  if (corpus.some(d => d.name === file.name)) { toast(`"${file.name}" is already in the corpus.`); return; }
  if (file.size > 50 * 1024 * 1024) toast(`"${file.name}" is large — parsing may be slow.`);

  const id = crypto.randomUUID();
  const item = addDocRow(id, file.name, 'Parsing…');

  try {
    const text = ext === 'pdf' ? await parsePDF(file)
               : ext === 'docx' ? await parseDOCX(file)
               : await parseText(file);

    const chunks = chunkText(text);
    if (!chunks.length) throw new Error('No readable content found in this file.');
    const tfData = chunks.map(c => ({ tf: buildTF(tokenize(c)) }));
    const doc = { id, name: file.name, chunks, tfData };
    corpus.push(doc);
    await idbSave(doc);
    setDocMeta(item, `${chunks.length} chunks`);
    updateStats();
    updateSend();
    suggestQuestions(doc);
  } catch (e) {
    item.remove();
    refreshEmptyDocs();
    appendMsg('assistant', e.message, null, false, true);
  }
}

// ── Sidebar UI ─────────────────────────────────────────────────────────────────
const icons = { pdf: '📕', docx: '📘', txt: '📄', md: '📝' };

function addDocRow(id, name, meta) {
  $('no-docs')?.remove();
  const ext = name.split('.').pop().toLowerCase();
  const row = document.createElement('div');
  row.className = 'doc'; row.dataset.id = id;
  row.innerHTML = `<span class="dico">${icons[ext] || '📄'}</span>
    <div class="dinfo">
      <div class="dname" title="${name}">${name}</div>
      <div class="dmeta">${meta}</div>
    </div>
    <button class="drm" title="Remove">×</button>`;
  row.querySelector('.drm').addEventListener('click', () => removeDoc(id));
  el.docs.appendChild(row);
  return row;
}

function setDocMeta(row, meta) { row.querySelector('.dmeta').textContent = meta; }

function refreshEmptyDocs() {
  if (!el.docs.querySelector('.doc'))
    el.docs.innerHTML = '<div id="no-docs">No documents yet</div>';
}

async function removeDoc(id) {
  corpus = corpus.filter(d => d.id !== id);
  await idbDel(id);
  el.docs.querySelector(`[data-id="${id}"]`)?.remove();
  refreshEmptyDocs();
  updateStats();
  updateSend();
}

function updateStats() {
  const n = corpus.length, c = corpus.reduce((s, d) => s + d.chunks.length, 0);
  el.stats.textContent = n ? `${n} doc${n > 1 ? 's' : ''} · ${c} chunks` : '';
}

// ── Markdown ───────────────────────────────────────────────────────────────────
const SAFE_TAGS = ['p','br','strong','em','code','pre','h1','h2','h3','ul','ol','li','blockquote','a'];
const renderMd = text => DOMPurify.sanitize(marked.parse(text), { ALLOWED_TAGS: SAFE_TAGS, ALLOWED_ATTR: ['href'] });

// ── Chat ───────────────────────────────────────────────────────────────────────
function appendMsg(role, content, sources, save = true, isErr = false) {
  el.empty?.remove();
  const msg = document.createElement('div');
  msg.className = `msg ${role}${isErr ? ' err' : ''}`;

  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.innerHTML = (role === 'assistant' && !isErr) ? renderMd(content) : '';
  if (role !== 'assistant' || isErr) bub.textContent = content;
  msg.appendChild(bub);

  if (role === 'assistant' && !isErr) {
    const acts = document.createElement('div');
    acts.className = 'msg-actions';
    const btn = document.createElement('button');
    btn.className = 'cpbtn'; btn.textContent = '⎘ Copy';
    btn.addEventListener('click', () => copyText(content, btn));
    acts.appendChild(btn);
    msg.appendChild(acts);
  }

  if (sources?.length) {
    const srcs = document.createElement('div');
    srcs.className = 'sources';
    for (const s of sources) {
      const chip = document.createElement('span');
      chip.className = 'chip';
      chip.textContent = `${s.doc.name} #${s.i + 1}`;
      chip.title = s.doc.chunks[s.i].slice(0, 200);
      srcs.appendChild(chip);
    }
    msg.appendChild(srcs);
  }

  el.msgs.appendChild(msg);
  el.msgs.scrollTop = el.msgs.scrollHeight;
  if (save) { chatHistory.push({ role, content }); saveHist(); }
  return msg;
}

function addTyping() {
  const msg = document.createElement('div');
  msg.className = 'msg assistant'; msg.id = '_typing';
  msg.innerHTML = '<div class="bubble"><span class="tdot"></span><span class="tdot"></span><span class="tdot"></span></div>';
  el.msgs.appendChild(msg);
  el.msgs.scrollTop = el.msgs.scrollHeight;
  return msg;
}

async function sendMessage() {
  const query = el.input.value.trim();
  if (!query || streaming || !corpus.length) return;
  el.input.value = '';
  const chipsEl = $('chips'); chipsEl.classList.add('hidden'); chipsEl.innerHTML = '';
  streaming = true; updateSend();
  appendMsg('user', query);

  const apiKey = lsGet('cb_key') || '';
  const baseUrl = (lsGet('cb_url') || 'https://api.openai.com/v1').replace(/\/$/, '');
  const model = $('model-select').value;

  el.ret.classList.remove('hidden');
  const expandedQuery = await expandWithHistory(query, chatHistory, baseUrl, apiKey, model);
  const hydeQuery = await hydeExpand(expandedQuery, baseUrl, apiKey, model);
  const hits = retrieve(hydeQuery);
  el.ret.classList.add('hidden');

  const context = hits.map((h, i) => `[${i + 1}] (${h.doc.name}):\n${h.doc.chunks[h.i]}`).join('\n\n');
  const system = `You are a helpful assistant. Answer based on the document excerpts below. If the answer isn't in the documents, say so clearly.\n\nExcerpts:\n${context}`;
  const messages = [
    { role: 'system', content: system },
    ...chatHistory.slice(-10),
    { role: 'user', content: query }
  ];

  let res;
  try {
    res = await fetch(`${baseUrl}/chat/completions`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
      body: JSON.stringify({ model, messages, stream: true })
    });
  } catch (e) {
    appendMsg('assistant', 'Network error: ' + e.message, null, false, true);
    streaming = false; updateSend(); return;
  }

  if (!res.ok) {
    const errs = { 401: 'Invalid API key — check the key in the top bar.', 429: 'Rate limit reached. Wait a moment and try again.', 500: 'API server error. Try again shortly.' };
    appendMsg('assistant', errs[res.status] || `API error ${res.status}`, null, false, true);
    streaming = false; updateSend(); return;
  }

  addTyping();
  const typing = $('_typing');
  let full = '';
  const aiMsg = appendMsg('assistant', '', hits, false);
  typing?.remove();
  const bub = aiMsg.querySelector('.bubble');
  bub.innerHTML = '';

  const reader = res.body.getReader(), dec = new TextDecoder();
  let buf = '';
  try {
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split('\n'); buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6);
        if (raw === '[DONE]') break;
        try {
          const delta = JSON.parse(raw).choices?.[0]?.delta?.content;
          if (delta) { full += delta; bub.innerHTML = renderMd(full); el.msgs.scrollTop = el.msgs.scrollHeight; }
        } catch {}
      }
    }
  } catch (e) {
    if (!full) { aiMsg.remove(); appendMsg('assistant', 'Stream interrupted: ' + e.message, null, false, true); }
  }

  if (full) { chatHistory.push({ role: 'assistant', content: full }); saveHist(); }
  streaming = false; updateSend();
}

// ── Copy ───────────────────────────────────────────────────────────────────────
function copyText(text, btn) {
  const ok = () => { btn.textContent = '✓ Copied'; setTimeout(() => btn.textContent = '⎘ Copy', 1600); };
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(ok).catch(() => execCopy(text, ok));
  } else { execCopy(text, ok); }
}
function execCopy(text, cb) {
  const ta = Object.assign(document.createElement('textarea'), { value: text });
  ta.style.cssText = 'position:fixed;opacity:0';
  document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); cb();
}

// ── Send button ────────────────────────────────────────────────────────────────
const updateSend = () => {
  el.send.disabled = streaming || corpus.length === 0;
  $('send-hint').textContent = corpus.length === 0 ? 'Upload a document to enable chat' : '⌘↵ send · Esc clear';
};

// ── Drop zone ──────────────────────────────────────────────────────────────────
function initDrop() {
  const dz = $('dz'), fi = $('file-input');
  dz.addEventListener('click', e => { if (!e.target.closest('label')) fi.click(); });
  fi.addEventListener('change', e => { [...e.target.files].forEach(processFile); fi.value = ''; });
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('over'));
  dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('over'); [...e.dataTransfer.files].forEach(processFile); });
  document.addEventListener('dragover', e => e.preventDefault());
  document.addEventListener('drop', e => { e.preventDefault(); if (e.target !== dz) [...e.dataTransfer.files].forEach(processFile); });
}

// ── Keyboard ───────────────────────────────────────────────────────────────────
el.input.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); sendMessage(); }
  if (e.key === 'Escape') el.input.value = '';
});
el.send.addEventListener('click', sendMessage);

// ── Boot ───────────────────────────────────────────────────────────────────────
async function init() {
  initSettings();
  await initIDB();
  const saved = await idbAll();
  if (Array.isArray(saved)) {
    for (const doc of saved) {
      corpus.push(doc);
      setDocMeta(addDocRow(doc.id, doc.name, ''), `${doc.chunks.length} chunks`);
    }
  }
  updateStats(); updateSend();
  if (corpus.length > 0 && el.empty) {
    el.empty.querySelector('p').textContent = 'Ask a question about your documents.';
  }
  try {
    chatHistory = JSON.parse(lsGet('cb_hist') || '[]');
    chatHistory.forEach(m => appendMsg(m.role, m.content, null, false));
  } catch { chatHistory = []; }
  initDrop();
}

init();
</script>
